<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">&#128203; Task Manager</h1>
      <button class="btn btn-primary" id="open-add">+ New Task</button>
    </header>

    <main class="main">
      <div class="filters">
        <button class="filter-btn active" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="all">All</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>

      <div id="task-list" class="task-list"></div>
      <p id="empty-msg" class="empty hidden">No tasks here.</p>
    </main>
  </div>

  <!-- Add / Edit Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">New Task</h2>
      <form id="task-form">
        <div class="field">
          <label for="f-title">Title <span class="required">*</span></label>
          <input type="text" id="f-title" placeholder="What needs to be done?" required>
        </div>
        <div class="field">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" placeholder="Optional details..." rows="2"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label for="f-due">Due Date</label>
            <input type="date" id="f-due">
          </div>
          <div class="field">
            <label for="f-priority">Priority</label>
            <select id="f-priority">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Task</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
